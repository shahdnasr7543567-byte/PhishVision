<!DOCTYPE html>
<html>
<head>
    <title>PhishVision</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial;
            background: #0a0a0f;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .card {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 40px;
            width: 550px;
            border: 1px solid #333;
            text-align: center;
        }
        
        h1 { font-size: 2.5rem; margin-bottom: 5px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        
        input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #0f0f1a;
            color: white;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        input:focus { outline: none; border-color: #6c63ff; }
        
        button {
            width: 100%;
            padding: 14px;
            background: #6c63ff;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        button:hover { background: #5a52d5; transform: scale(1.02); }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .safe { background: #1a3a1a; border: 1px solid #4caf50; }
        .phishing { background: #3a1a1a; border: 1px solid #f44336; }
        
        .verdict { font-size: 1.8rem; font-weight: bold; margin-bottom: 10px; }
        .reasons { font-size: 0.9rem; color: #aaa; text-align: left; }
        .reasons p { margin: 5px 0; }
        
        .loading { margin-top: 20px; color: #888; display: none; }
        
        .history { margin-top: 30px; width: 550px; }
        .history h3 { color: #888; margin-bottom: 10px; text-align: left; }
        
        .history-item {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }
        
        .history-url { font-size: 0.85rem; color: #aaa; }
        .badge-safe { color: #4caf50; font-weight: bold; }
        .badge-phishing { color: #f44336; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>👁️ PhishVision</h1>
        <p class="subtitle">AI-Powered Phishing Detector</p>
        
        <input id="url" placeholder="Enter URL... (https://example.com)" />
        <button onclick="scanURL()">🔍 Scan</button>
        
        <div id="loading" class="loading">⏳ Scanning... please wait</div>
        
        <div id="result" class="result">
            <div class="verdict" id="verdict"></div>
            <div class="reasons" id="reasons"></div>
        </div>
    </div>
    
    <div class="history" id="historySection" style="display:none">
        <h3>📋 Scan History</h3>
        <div id="historyList"></div>
    </div>
    
    <script>
    let history = [];
    
    async function scanURL() {
        const url = document.getElementById('url').value;
        if (!url) return;
        
        document.getElementById('loading').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        
        const res = await fetch('/scan', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url})
        });
        
        const data = await res.json();
        
        document.getElementById('loading').style.display = 'none';
        
        const resultDiv = document.getElementById('result');
        resultDiv.className = 'result ' + (data.phishing ? 'phishing' : 'safe');
        resultDiv.style.display = 'block';
        
        document.getElementById('verdict').textContent = 
            data.phishing ? '⚠️ PHISHING DETECTED!' : '✅ SAFE';
        
        document.getElementById('reasons').innerHTML = 
            data.reasons.length > 0 
            ? data.reasons.map(r => `<p>• ${r}</p>`).join('') 
            : '<p>• No suspicious activity found</p>';
        
        history.unshift({url, phishing: data.phishing});
        history = history.slice(0, 5);
        renderHistory();
    }
    
    function renderHistory() {
        const section = document.getElementById('historySection');
        const list = document.getElementById('historyList');
        section.style.display = 'block';
        
        list.innerHTML = history.map(item => `
            <div class="history-item">
                <span class="history-url">${item.url}</span>
                <span class="${item.phishing ? 'badge-phishing' : 'badge-safe'}">
                    ${item.phishing ? '⚠️ PHISHING' : '✅ SAFE'}
                </span>
            </div>
        `).join('');
    }
    
    document.getElementById('url').addEventListener('keypress', e => {
        if (e.key === 'Enter') scanURL();
    });
    </script>
</body>
</html>
